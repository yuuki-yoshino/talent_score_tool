
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary)}
.wrap{padding:1.5rem 0}
.tool-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.06em;margin-bottom:1.25rem}
.field-row{margin-bottom:1rem}
.field-label{font-size:13px;color:var(--color-text-secondary);margin-bottom:4px}
input[type=text]{width:100%;padding:8px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;font-family:var(--font-sans);background:var(--color-background-primary);color:var(--color-text-primary)}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:14px;font-weight:500;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-blue{background:#378ADD}
.dot-green{background:#639922}
.dot-amber{background:#BA7517}
.slider-row{display:flex;align-items:center;gap:12px;margin-bottom:0.6rem}
.slider-label{font-size:13px;color:var(--color-text-secondary);width:80px;flex-shrink:0}
.slider-row input[type=range]{flex:1}
.slider-val{font-size:14px;font-weight:500;min-width:20px;text-align:right}
.result-area{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-top:1.5rem}
.result-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:0.75rem;font-weight:500;letter-spacing:0.05em}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.result-cell{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:0.75rem;text-align:center}
.result-cell .r-name{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-cell .r-score{font-size:1.5rem;font-weight:500}
.score-low{color:#E24B4A}
.score-mid{color:#BA7517}
.score-high{color:#639922}
.score-top{color:#2b6cb0}
.total-row{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 0;border-top:0.5px solid var(--color-border-tertiary);margin-top:0.25rem}
.total-label{font-size:13px;color:var(--color-text-secondary)}
.total-val{font-size:2rem;font-weight:500}
.advice{font-size:13px;line-height:1.7;color:var(--color-text-secondary);padding-top:0.75rem;border-top:0.5px solid var(--color-border-tertiary);margin-top:0.75rem}
.advice strong{color:var(--color-text-primary);font-weight:500}
.add-btn{width:100%;margin-top:0.5rem;padding:10px;border-radius:var(--border-radius-md);font-size:14px;font-family:var(--font-sans);cursor:pointer;background:transparent;border:0.5px solid var(--color-border-secondary);color:var(--color-text-primary)}
.add-btn:hover{background:var(--color-background-secondary)}
.remove-btn{font-size:11px;color:var(--color-text-secondary);background:none;border:none;cursor:pointer;margin-left:auto;padding:0}
.remove-btn:hover{color:#E24B4A}
.ask-btn{width:100%;margin-top:1.25rem;padding:11px;border-radius:var(--border-radius-md);font-size:14px;font-family:var(--font-sans);cursor:pointer;background:#2b6cb0;color:#fff;border:none}
.ask-btn:hover{background:#2c5282}
.bar-wrap{margin-top:1rem}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-name{font-size:12px;color:var(--color-text-secondary);width:70px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--color-border-tertiary);border-radius:4px;height:14px;position:relative}
.bar-fill{height:100%;border-radius:4px;background:#378ADD;transition:width 0.3s}
.bar-score{font-size:12px;font-weight:500;min-width:28px;color:var(--color-text-primary)}
</style>

<div class="wrap">
<div class="tool-label">才能スコア診断ツール — 分野を追加してスコアをつけよう</div>

<div id="fields-container"></div>

<button class="add-btn" onclick="addField()">+ 分野を追加する</button>

<div class="result-area" id="result-area" style="display:none">
  <div class="result-label">スコア比較</div>
  <div class="bar-wrap" id="bar-chart"></div>
  <div class="advice" id="advice-text"></div>
  <button class="ask-btn" id="ask-btn">この結果をもとに戦略を相談する ↗</button>
</div>
</div>

<script>
var fields = [];
var nextId = 0;

function addField() {
  var id = nextId++;
  fields.push({id: id, name: '', talent: 3, effort: 3, era: 3});
  renderFields();
  updateResults();
}

function removeField(id) {
  fields = fields.filter(function(f){return f.id !== id});
  renderFields();
  updateResults();
}

function scoreColor(s) {
  if(s >= 80) return '#639922';
  if(s >= 40) return '#BA7517';
  return '#E24B4A';
}

function renderFields() {
  var c = document.getElementById('fields-container');
  c.innerHTML = '';
  fields.forEach(function(f) {
    var div = document.createElement('div');
    div.className = 'card';
    div.innerHTML =
      '<div class="card-title">' +
        '<span class="dot dot-blue"></span>' +
        '<input type="text" placeholder="分野名（例：ブログ執筆）" value="' + (f.name||'') + '" oninput="updateName(' + f.id + ',this.value)" style="border:none;padding:0;font-size:14px;font-weight:500;background:transparent;width:auto;flex:1" />' +
        '<button class="remove-btn" onclick="removeField(' + f.id + ')">削除</button>' +
      '</div>' +
      makeSlider(f.id, 'talent', '才能', f.talent, '#378ADD') +
      makeSlider(f.id, 'effort', '努力', f.effort, '#639922') +
      makeSlider(f.id, 'era', '時代の流れ', f.era, '#BA7517') +
      '<div style="display:flex;align-items:center;justify-content:space-between;padding-top:0.75rem;border-top:0.5px solid var(--color-border-tertiary);margin-top:0.5rem">' +
        '<span style="font-size:13px;color:var(--color-text-secondary)">スコア</span>' +
        '<span style="font-size:1.4rem;font-weight:500;color:' + scoreColor(f.talent*f.effort*f.era) + '">' + (f.talent*f.effort*f.era) + '</span>' +
      '</div>';
    c.appendChild(div);
  });
}

function makeSlider(id, key, label, val, color) {
  return '<div class="slider-row">' +
    '<span class="slider-label" style="font-size:12px">' + label + '</span>' +
    '<input type="range" min="1" max="5" step="1" value="' + val + '" oninput="updateSlider(' + id + ',\'' + key + '\',this.value)" />' +
    '<span class="slider-val" id="sv-' + id + '-' + key + '" style="color:' + color + '">' + val + '</span>' +
  '</div>';
}

function updateName(id, val) {
  var f = fields.find(function(x){return x.id===id});
  if(f) f.name = val;
  updateResults();
}

function updateSlider(id, key, val) {
  var f = fields.find(function(x){return x.id===id});
  if(f) {
    f[key] = parseInt(val);
    var el = document.getElementById('sv-' + id + '-' + key);
    if(el) el.textContent = val;
    renderFields();
    updateResults();
  }
}

function updateResults() {
  var area = document.getElementById('result-area');
  if(fields.length === 0) { area.style.display='none'; return; }
  area.style.display='block';

  var sorted = fields.slice().sort(function(a,b){
    return (b.talent*b.effort*b.era) - (a.talent*a.effort*a.era);
  });
  var max = sorted[0];

  var barChart = document.getElementById('bar-chart');
  barChart.innerHTML = '';
  sorted.forEach(function(f) {
    var score = f.talent * f.effort * f.era;
    var pct = Math.round(score / 125 * 100);
    var row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML =
      '<span class="bar-name">' + (f.name || '未入力') + '</span>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + scoreColor(score) + '"></div></div>' +
      '<span class="bar-score">' + score + '</span>';
    barChart.appendChild(row);
  });

  var advice = document.getElementById('advice-text');
  var name = max.name || 'この分野';
  var maxScore = max.talent * max.effort * max.era;
  var msg = '';
  if(maxScore >= 75) {
    msg = '<strong>' + name + '</strong>は高スコアです。才能・努力・時代の流れが揃っている可能性が高く、ここへの集中投資が成果を最大化する近道です。';
  } else if(max.talent <= 2) {
    msg = 'どの分野も才能スコアが低めです。まだ才能を発揮できる分野に出会っていない可能性があります。新しい分野をもっと試してみましょう。';
  } else if(max.effort <= 2) {
    msg = '<strong>' + name + '</strong>は才能があるかもしれませんが、努力スコアがまだ低い状態です。まず努力を「5」に上げてから結果を再評価してみてください。';
  } else if(max.era <= 2) {
    msg = '<strong>' + name + '</strong>は才能と努力があっても、時代の追い風が弱い状態です。同じ才能を活かせる、より追い風が強い隣接分野を探してみましょう。';
  } else {
    msg = '<strong>' + name + '</strong>が最もスコアが高いです。3つの要素をさらに伸ばす具体的な戦略を立てましょう。';
  }
  advice.innerHTML = msg;

  document.getElementById('ask-btn').onclick = function() {
    var summary = sorted.map(function(f){
      return (f.name||'未入力') + '（才能' + f.talent + '×努力' + f.effort + '×時代' + f.era + '=' + (f.talent*f.effort*f.era) + '）';
    }).join('、');
    sendPrompt('私の分野別スコアは次の通りです：' + summary + '。このスコアをもとに、どの分野に集中すべきか、また各スコアをどう改善すればいいか具体的なアドバイスをください。');
  };
}

addField();
addField();
</script>
